id: navidrome
name: Navidrome
description: Stream your music collection — lightweight, Subsonic-compatible.
category: media
icon: "/app-icons/navidrome.png"
website: https://www.navidrome.org
env: []
web:
  - service: navidrome
    port: 4533
compose:
  services:
    navidrome:
      image: deluan/navidrome:latest
      volumes:
        - navidrome_data:/data
        - navidrome_music:/music
  volumes:
    navidrome_data: {}
    navidrome_music: {}
