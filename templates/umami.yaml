id: umami
name: Umami
description: Privacy-friendly web analytics — a simple alternative to Google Analytics.
category: analytics
icon: "/app-icons/umami.png"
website: https://umami.is
env:
  - key: APP_SECRET
    generate: hex32
  - key: DB_PASSWORD
    generate: hex16
web:
  - service: umami
    port: 3000
compose:
  services:
    umami:
      image: ghcr.io/umami-software/umami:postgresql-latest
      environment:
        DATABASE_URL: "postgresql://umami:{{DB_PASSWORD}}@db:5432/umami"
        DATABASE_TYPE: postgresql
        APP_SECRET: "{{APP_SECRET}}"
      depends_on:
        - db
    db:
      image: postgres:15-alpine
      environment:
        POSTGRES_DB: umami
        POSTGRES_USER: umami
        POSTGRES_PASSWORD: "{{DB_PASSWORD}}"
      volumes:
        - umami_db:/var/lib/postgresql/data
  volumes:
    umami_db: {}
